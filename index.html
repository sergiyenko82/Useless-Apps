<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Is it empty?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #0a0a0f;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 52px 24px 40px;
  }

  .title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 32px;
  }

  /* Camera viewfinder */
  .viewfinder-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 20px;
    overflow: hidden;
    background: #111;
    margin-bottom: 24px;
  }

  #videoEl {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvasEl { display: none; }

  .vf-overlay {
    position: absolute; inset: 0;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.12);
    pointer-events: none;
  }

  .vf-corner {
    position: absolute;
    width: 22px; height: 22px;
    border-color: rgba(255,255,255,0.55);
    border-style: solid;
  }
  .vf-corner.tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .vf-corner.tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .vf-corner.bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .vf-corner.br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  .vf-hint {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    white-space: nowrap;
    pointer-events: none;
  }

  .placeholder-icon {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
  }

  .placeholder-icon svg { opacity: 0.2; }

  .placeholder-icon p {
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    max-width: 180px;
    line-height: 1.5;
  }

  /* Capture button */
  .capture-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 28px;
  }

  .btn-capture {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.6);
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-capture:active { transform: scale(0.93); }

  .btn-capture::after {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: #fff;
    transition: background 0.15s;
  }

  .btn-capture.loading::after { background: #555; }

  .btn-start {
    background: #1a1a2e;
    border: 1.5px solid rgba(255,255,255,0.15);
    color: #fff;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 50px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Result card */
  .result-card {
    background: #14141f;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    display: none;
  }

  .result-card.visible { display: block; }

  .result-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .container-label {
    font-size: 13px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }

  .container-name {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }

  .pct-badge {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #fff;
  }

  .pct-badge span {
    font-size: 16px;
    font-weight: 400;
    color: #888;
  }

  /* Gauge */
  .gauge-wrap {
    background: rgba(255,255,255,0.05);
    border-radius: 50px;
    height: 18px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .gauge-fill {
    height: 100%;
    border-radius: 50px;
    transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: linear-gradient(90deg, #2979ff, #00c6ff);
  }

  .gauge-fill.low { background: linear-gradient(90deg, #e53935, #ff7043); }
  .gauge-fill.mid { background: linear-gradient(90deg, #f57c00, #ffca28); }

  .result-note {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
  }

  /* Status */
  .status-msg {
    text-align: center;
    font-size: 14px;
    color: #666;
    margin-top: 8px;
    min-height: 20px;
  }

  .status-msg.error { color: #ef5350; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="title">Is it empty?</div>
  <div class="subtitle">Point your camera at any container</div>

  <div class="viewfinder-wrap">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>
    <div class="vf-overlay">
      <div class="vf-corner tl"></div>
      <div class="vf-corner tr"></div>
      <div class="vf-corner bl"></div>
      <div class="vf-corner br"></div>
    </div>
    <div class="placeholder-icon" id="placeholderIcon">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <rect x="8" y="16" width="40" height="30" rx="4" stroke="white" stroke-width="2"/>
        <circle cx="28" cy="31" r="9" stroke="white" stroke-width="2"/>
        <rect x="20" y="10" width="16" height="8" rx="2" stroke="white" stroke-width="2"/>
      </svg>
      <p>Tap "Start camera" to begin</p>
    </div>
    <div class="vf-hint" id="vfHint" style="display:none">Center the container in frame</div>
  </div>

  <div class="capture-row">
    <button class="btn-start" id="btnStart" onclick="startCamera()">Start camera</button>
    <button class="btn-capture" id="btnCapture" onclick="capture()" style="display:none" title="Capture"></button>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div>
        <div class="container-label">Container detected</div>
        <div class="container-name" id="containerName">—</div>
      </div>
      <div class="pct-badge" id="pctBadge">—<span>%</span></div>
    </div>
    <div class="gauge-wrap">
      <div class="gauge-fill" id="gaugeFill" style="width:0%"></div>
    </div>
    <div class="result-note" id="resultNote"></div>
  </div>
</div>

<script>
let stream = null;
const video = document.getElementById('videoEl');
const canvas = document.getElementById('canvasEl');

async function startCamera() {
  const btn = document.getElementById('btnStart');
  btn.textContent = 'Starting…';
  btn.disabled = true;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('placeholderIcon').style.display = 'none';
    document.getElementById('vfHint').style.display = 'block';
    btn.style.display = 'none';
    document.getElementById('btnCapture').style.display = 'block';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Start camera';
    setStatus('Camera access denied. Please allow camera in Settings.', true);
  }
}

async function capture() {
  const btnC = document.getElementById('btnCapture');
  btnC.classList.add('loading');
  btnC.onclick = null;
  setStatus('<span class="spinner"></span> Analyzing…');
  document.getElementById('resultCard').classList.remove('visible');

  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const imageData = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: imageData }
            },
            {
              type: 'text',
              text: `You are a liquid level detection AI. Look at this image and identify the container and how full it is.

Respond ONLY with valid JSON, no markdown, no extra text:
{
  "container": "<short name, e.g. Hot sauce bottle, Milk jug, Water glass>",
  "percent": <integer 0-100, how full the container is>,
  "note": "<one sentence describing what you see, e.g. 'About half a bottle of Tabasco remaining.'>",
  "confidence": "<high|medium|low>"
}

If no container or liquid is visible, use percent: 0 and note that no container was detected.`
            }
          ]
        }]
      })
    });

    const data = await res.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '{}';
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
    catch { throw new Error('Could not parse response'); }

    showResult(parsed);
    setStatus('');
  } catch(e) {
    setStatus('Analysis failed. Please try again.', true);
  }

  btnC.classList.remove('loading');
  btnC.onclick = capture;
}

function showResult({ container, percent, note, confidence }) {
  const pct = Math.max(0, Math.min(100, parseInt(percent) || 0));
  document.getElementById('containerName').textContent = container || 'Unknown container';
  document.getElementById('pctBadge').innerHTML = pct + '<span>%</span>';
  document.getElementById('resultNote').textContent = note || '';

  const fill = document.getElementById('gaugeFill');
  fill.className = 'gauge-fill' + (pct <= 25 ? ' low' : pct <= 55 ? ' mid' : '');
  requestAnimationFrame(() => { fill.style.width = pct + '%'; });

  const card = document.getElementById('resultCard');
  card.classList.add('visible');
}

function setStatus(msg, isError) {
  const el = document.getElementById('statusMsg');
  el.innerHTML = msg;
  el.className = 'status-msg' + (isError ? ' error' : '');
}
</script>
</body>
</html>
